<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0,maximum-scale=1.0,width=device-width">
    <title>SI Schedule</title>
    <link rel="stylesheet" th:href="@{/SIschedule.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
</head>
<body>

<div th:replace="~{headerFragment :: header('SI Schedule')}"></div>

<div class="stripe-container">
    <img th:src="@{/fadedstripe.svg}" class="stripe">
    <div class="stripe-text">
        SI Schedule
        <hr class="accent-line">
    </div>
</div>

<main class="container">
    <table class="table-fill">
        <thead>
        <tr>
            <th>SI LEADER</th>
            <th>CLASS</th>
            <th>DAY</th>
            <th>TIMES</th>
            <th>LOCATION</th>
            <th>PROFESSOR</th>
            <th>MEETING TIMES</th>
        </tr>
        </thead>
        <tbody id="scheduleBody">
        <tr th:each="s : ${siSchedule.get('sessions')}">
            <td th:text="${s.get('siLeader')}">Leader</td>
            <td th:text="${s.get('className')}">Class</td>
            <td th:text="${s.get('day')}">Day</td>
            <td th:text="${s.get('start') + ' - ' + s.get('end')}">Times</td>
            <td th:text="${s.get('location') ?: 'TBD'}">Location</td>
            <td th:text="${s.get('professor')}">Professor</td>
            <td th:text="${s.get('classMeetingTimes')}">Meeting Times</td>
        </tr>
        </tbody>
    </table>
</main>

<script th:inline="javascript">
    // This script only runs if the database returns 0 rows (Fallback for URL testing)
    const tbody = document.getElementById('scheduleBody');

    if (tbody.children.length === 0) {
        const params = new URLSearchParams(window.location.search);
        const raw = params.get('schedule');

        if (raw) {
            try {
                const data = JSON.parse(decodeURIComponent(raw));
                if (data && data.sessions) {
                    data.sessions.forEach(s => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${data.siLeader || 'N/A'}</td>
                            <td>${data.className || 'N/A'}</td>
                            <td>${s.day}</td>
                            <td>${s.start} - ${s.end}</td>
                            <td>${s.location || 'TBD'}</td>
                            <td>${data.professor || 'N/A'}</td>
                            <td>${data.classMeetingTimes || 'N/A'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch(e) { console.error("URL Parsing failed", e); }
        } else {
            const tr = document.createElement('tr');
            tr.innerHTML = '<td colspan="7" style="text-align:center;">No sessions currently scheduled.</td>';
            tbody.appendChild(tr);
        }
    }
</script>
</body>
</html>
