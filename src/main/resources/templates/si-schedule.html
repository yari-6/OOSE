<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI Schedule</title>
    <link rel="stylesheet" th:href="@{/SIschedule.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
</head>
<body>

<div th:replace="~{headerFragment :: header('SI Schedule')}"></div>
<main class="schedule-wrapper">
    <table class="si-table">
        <thead>
        <tr>
            <th>SI Leader</th>
            <th>Class</th>
            <th>Day</th>
            <th>Times</th>
            <th>Location</th>
            <th>Professor</th>
            <th>Meeting Times</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(schedule)}">
            <td colspan="7" class="empty-state">No sessions currently scheduled.</td>
        </tr>

        <tr th:each="s, iterStat : ${schedule}"
            th:classappend="${iterStat.first || s.get('siLeader') != schedule[iterStat.index - 1].get('siLeader')} ? 'group-start' : ''">

            <td class="cell-shared leader-col">
                <th:block th:if="${iterStat.first || s.get('siLeader') != schedule[iterStat.index - 1].get('siLeader')}">
                    <a th:if="${s.get('tutorId') != null}"
                       th:href="@{/tutors/{id}(id=${s.get('tutorId')})}"
                       th:text="${s.get('siLeader')}"></a>
                    <span th:unless="${s.get('tutorId') != null}" th:text="${s.get('siLeader')}"></span>
                </th:block>
            </td>

            <td class="cell-shared" th:text="${iterStat.first || s.get('siLeader') != schedule[iterStat.index - 1].get('siLeader')} ? ${s.get('className')} : ''"></td>

            <td class="cell-session">
                    <span th:switch="${s.get('day')}">
                        <span th:case="'M'">Monday</span><span th:case="'T'">Tuesday</span>
                        <span th:case="'W'">Wednesday</span><span th:case="'R'">Thursday</span>
                        <span th:case="'F'">Friday</span><span th:case="*" th:text="${s.get('day')}"></span>
                    </span>
            </td>
            <td class="cell-session" th:text="${s.get('start') + ' - ' + s.get('end')}"></td>
            <td class="cell-session" th:text="${s.get('location') ?: 'TBD'}"></td>

            <td class="cell-shared" th:text="${iterStat.first || s.get('siLeader') != schedule[iterStat.index - 1].get('siLeader')} ? ${s.get('professor')} : ''"></td>
            <td class="cell-shared" th:text="${iterStat.first || s.get('siLeader') != schedule[iterStat.index - 1].get('siLeader')} ? ${s.get('classMeetingTimes')} : ''"></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
