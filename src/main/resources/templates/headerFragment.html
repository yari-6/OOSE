<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<header th:fragment="header(title)" class="header">
    <a th:href="${session.isAdmin == true ? '/admin/dashboard' : '/'}">
        <img src="/Husky-Clip-Art-Transparent-File.png" alt="Husky" class="logo">
    </a>

    <h1 th:text="${title}">Default Title</h1>
    <hr class="title-line">

    <div class="signin-container">

        <a th:if="${session.tutorID == null}"
           th:href="@{/sign-in}"
           class="signin-btn">
            Sign In
        </a>

        <!-- Appears when a Tutor is signed in -->
        <div th:if="${session.tutorID != null}" class="user-section">

            <div class="dropdown">
                <button class="dropbtn">
                    Welcome, <span th:text="${session.tutorID}"></span> ▼
                </button>
                <div class="dropdown-content">
                    <a th:if="${session.isAdmin == true}" th:href="@{/admin/dashboard}" ...>Admin Panel</a>
                    <a th:if="${session.isAdmin == false}" th:href="@{/tutors/{id}(id=${session.tutorID})}">Profile</a>
                    <a th:href="@{/logout}">Logout</a>
                </div>
            </div>

        </div>
    </div>
</header>
