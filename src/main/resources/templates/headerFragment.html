<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header(title)" class="header">
    <a th:href="@{/}">
        <img src="/Husky-Clip-Art-Transparent-File.png" alt="Husky" class="logo">
    </a>
    <h1 th:text="${title}">Default Title</h1>
    <hr class="title-line">

    <div class="signin-container">
        <a th:if="${session.tutorID == null}"
           th:href="@{/sign-in}"
           class="signin-btn">
            Sign In
        </a>

        <div th:if="${session.tutorID != null}" class="user-section">
            <span class="welcome-text">
                Welcome, <span th:text="${session.tutorID}"></span>
            </span>

            <a th:href="@{/logout}" class="logout-btn">Logout</a>
        </div>
    </div>
</header>

</body>
</html>
