<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <link rel="stylesheet" th:href="@{/sign-in.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <img src="Husky-Clip-Art-Transparent-File.png" alt="Husky Logo" class="logo">
        <h1>Bloom Tutors</h1>
    </div>

    <div>
        <hr class="accent-line">
    </div>

    <h1>Sign in</h1>

    <form th:action="@{/sign-in}" method="post">
        <div class="input-section">
            <label for="username">Username: </label>
            <input type="text" name="tutorID" id = "username" placeholder="Username">
            <label for="password">Password: </label>
            <input type="password" name = "pass" id = "password" placeholder="Password">
        </div>
        <div class="button-section">
            <button type="submit">Enter</button>
        </div>
    </form>



    <div class="info-box">
        <p>
            This is a private system for use of Bloomsburg University Tutors only.
        </p>
    </div>

    <div class="back-section">
        <a th:href="@{/}" class="back-button">Back</a>
    </div>

</div>

<footer class="footer">
</footer>

</body>
</html>
