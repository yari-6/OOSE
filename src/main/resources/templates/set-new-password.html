<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Set New Password</title>
    <link rel="stylesheet" th:href="@{/sign-in.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <img src="/Husky-Clip-Art-Transparent-File.png" alt="Husky Logo" class="logo">
        <h1>Bloom Tutors</h1>
    </div>

    <div>
        <hr class="accent-line">
    </div>

    <h1>Set New Password</h1>

    <form th:action="@{/set-new-password}" th:object="${newPassword}" method="post">
        <div class="input-section">
            <label>New Password: </label>
            <input type="password" th:field="*{newPass}" placeholder="New Password">
            <div th:if="${#fields.hasErrors('newPass')}" th:errors="*{newPass}"></div>
            <label>Confirm New Password: </label>
            <input type="password" th:field="*{confirmPass}" placeholder="Confirm New Password">
            <div th:if="${#fields.hasErrors('confirmPass')}" th:errors="*{confirmPass}"></div>
        </div>
        <div class="button-section">
            <button type="submit">Enter</button>
        </div>
    </form>



    <div class="info-box">
        <p>
            This is a private system for use of Bloomsburg University Tutors only.
        </p>
    </div>

</div>

<footer class="footer">
</footer>

</body>
</html>
