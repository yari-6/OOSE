<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="initial-scale=1.0,maximum-scale=1.0,width=device-width" />
  <title>SI Schedule Builder</title>
  <link rel="stylesheet" th:href="@{/time-submisson-SI.css}" />
  <link rel="stylesheet" th:href="@{/header.css}" />
</head>
<body>

<div th:replace="~{headerFragment :: header('SI Time Submission')}"></div>

<div class="stripe-container">
  <img th:src="@{/fadedstripe.svg}" class="stripe" />
  <div class="stripe-text">
    Blooms Tutors – Making scheduling easy!
    <hr class="accent-line" />
  </div>
</div>

<main class="container" id="app">
  <form th:action="@{/si-builder/preview}" method="post" id="siForm">
    <div class="form-card">
      <h2>SI Session Builder</h2>

      <div th:if="${error}" class="error-banner" style="color: #b91c1c; background: #fee2e2; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; border: 1px solid #f87171;">
        <p th:text="${error}"></p>
      </div>

      <div class="input-grid">
        <div class="input-group">
          <label for="SILeader">SI Leader Name</label>
          <input type="text" id="SILeader" name="siLeader" th:value="${siName}" readonly class="readonly-input" />
        </div>
        <div class="input-group">
          <label for="Class">Class / Course</label>
          <input type="text" id="Class" name="className" th:value="${info?.className}" placeholder="e.g. BIOL 114" required />
        </div>
        <div class="input-group">
          <label for="Professor">Professor</label>
          <input type="text" id="Professor" name="professor" th:value="${info?.professor}" placeholder="Name" required />
        </div>
        <div class="input-group">
          <label for="ClassMeetingTimes">Course Meeting Times</label>
          <input type="text" id="ClassMeetingTimes" name="classMeetingTimes" th:value="${info?.classMeetingTimes}" placeholder="MWF 10:00AM" required />
        </div>
      </div>

      <div class="controls">
        <div class="input-group">
          <label for="pattern">Session Pattern</label>
          <select id="pattern" name="pattern" class="small" required>
            <option value="4x50" th:selected="${info?.pattern == '4x50'}">4 × 50 min</option>
            <option value="3x75" th:selected="${info?.pattern == '3x75'}">3 × 75 min</option>
          </select>
        </div>
        <div class="button-group">
          <button type="submit" class="btn-secondary">Review Schedule</button>
        </div>
      </div>
    </div>

    <div id="sessionsWrap"></div>
  </form>

  <div id="tableWrap" th:if="${sessions != null}">
    <hr class="section-divider" />
    <h3 class="preview-title">Review Generated Schedule</h3>

    <table class="table-fill fade-in">
      <thead>
      <tr>
        <th>SI LEADER</th>
        <th>CLASS</th>
        <th>DAY</th>
        <th>TIMES</th>
        <th>LOCATION</th>
        <th>PROFESSOR</th>
        <th>MEETING TIMES</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="s : ${sessions}">
        <td th:text="${info.siLeader}"></td>
        <td th:text="${info.className}"></td>
        <td>
          <span th:switch="${s.day}">
            <span th:case="'M'">Monday</span>
            <span th:case="'T'">Tuesday</span>
            <span th:case="'W'">Wednesday</span>
            <span th:case="'R'">Thursday</span>
            <span th:case="'F'">Friday</span>
            <span th:case="*" th:text="${s.day}"></span>
          </span>
        </td>
        <td th:text="${s.start + ' - ' + s.end}"></td>
        <td th:classappend="${#strings.contains(s.location, 'PENDING')} ? 'location-pending'"
            th:text="${s.location}">
        </td>
        <td th:text="${info.professor}"></td>
        <td th:text="${info.classMeetingTimes}"></td>
      </tr>
      </tbody>
    </table>

    <form th:action="@{/si-builder/confirm}" method="post" class="confirm-container">
      <button type="submit" class="submit fade-in">Save to Database</button>
      <p class="helper-text">Everything looks correct? Click save to publish this schedule.</p>
    </form>
  </div>
</main>

<script th:inline="javascript">
  (function(){
    const patternSelect = document.getElementById('pattern');
    const wrap = document.getElementById('sessionsWrap');
    const siForm = document.getElementById('siForm');

    // 1. Define Helper functions first to avoid reference errors
    const fmt = m => {
      let h = Math.floor(m / 60);
      let mm = String(m % 60).padStart(2, '0');
      let suffix = h >= 12 ? 'PM' : 'AM';
      let displayH = h % 12 || 12;
      return `${displayH}:${mm} ${suffix}`;
    };

    function renderSessions() {
      wrap.innerHTML = '';
      const [count, dur] = patternSelect.value.split('x').map(Number);

      for(let i=0; i<count; i++) {
        const div = document.createElement('div');
        div.className = 'session-row fade-in';

        div.innerHTML = `
          <span style="font-weight:bold; min-width:100px;">Session ${i+1}:</span>
          <select name="sessions[${i}].day" class="day-select" required>
            <option value="M">Monday</option><option value="T">Tuesday</option>
            <option value="W">Wednesday</option><option value="R">Thursday</option>
            <option value="F">Friday</option>
          </select>
          <select name="sessions[${i}].startMinutes" class="time-select" required></select>
          <span class="end-display" style="margin-left: 15px; font-size: 0.9em; color: #666;"></span>
        `;

        const timeSel = div.querySelector('.time-select');
        const endDisp = div.querySelector('.end-display');

        for(let t = 660; t <= 1080; t += 15) {
          const opt = document.createElement('option');
          opt.value = t; opt.textContent = fmt(t);
          timeSel.appendChild(opt);
        }

        timeSel.addEventListener('change', () => {
          endDisp.textContent = " — Ends at " + fmt(Number(timeSel.value) + dur);
        });

        timeSel.dispatchEvent(new Event('change'));
        wrap.appendChild(div);
      }
    }

    // 2. Set up event listeners
    siForm.addEventListener('submit', (e) => {
        const rows = wrap.querySelectorAll('.session-row');
        const seen = new Set();

        for (const row of rows) {
            const day = row.querySelector('.day-select').value;
            const time = row.querySelector('.time-select').value;
            const comboKey = `${day}-${time}`;

            if (seen.has(comboKey)) {
                e.preventDefault();
                const dayName = row.querySelector('.day-select').selectedOptions[0].text;
                alert(`Overlap Error: You have multiple sessions scheduled for ${dayName} at ${fmt(Number(time))}.`);
                return;
            }
            seen.add(comboKey);
        }
    });

    patternSelect.addEventListener('change', renderSessions);

    // 3. Initial execution
    renderSessions();

    // 4. Pre-fill logic for existing data
    const existingData = /*[[${existingSchedule}]]*/ [];
    if (existingData && existingData.length > 0) {
      const count = existingData.length;
      if (count === 3) patternSelect.value = "3x75";
      if (count === 4) patternSelect.value = "4x50";

      renderSessions();

      const rows = wrap.querySelectorAll('.session-row');
      existingData.forEach((session, index) => {
        if (rows[index]) {
          rows[index].querySelector('.day-select').value = session.sessionID.day;
          const [h, m] = session.sessionID.time.split(':');
          rows[index].querySelector('.time-select').value = (parseInt(h) * 60) + parseInt(m);
          rows[index].querySelector('.time-select').dispatchEvent(new Event('change'));
        }
      });
    }
  })();
</script>

</body>
</html>
