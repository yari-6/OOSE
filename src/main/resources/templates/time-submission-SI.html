<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SI Schedule Builder</title>
  <link rel="stylesheet" th:href="@{/time-submisson-SI.css}">
  <link rel="stylesheet" th:href="@{/header.css}">
  <style>
    .session-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
      padding: 10px;
      background: #f4f4f4;
      border-radius: 6px;
    }
    .table-input {
      width: 100%;
      border: none;
      background: transparent;
      text-align: center;
      padding: 4px;
    }
    .table-fill th {
      background-color: #6f263d;
      color: white;
      padding: 10px;
    }
  </style>
</head>
<body>

<div th:replace="headerFragment :: header('SI Time Submission')"></div>

<div class="stripe-container">
  <img th:src="@{/fadedstripe.svg}" class="stripe">
  <div class="stripe-text">
    Blooms Tutors – Making scheduling easy!
    <hr class="accent-line">
  </div>
</div>

<main class="container" id="app">
  <div class="form-row">
    <div class="input-group">
      <label for="SILeader">SI Leader Name</label>
      <input type="text" id="SILeader" placeholder="Name">
    </div>
    <div class="input-group">
      <label for="Class">Class / Course</label>
      <input type="text" id="Class" placeholder="e.g. BIOL 114">
    </div>
    <div class="input-group">
      <label for="Professor">Professor</label>
      <input type="text" id="Professor" placeholder="Name">
    </div>
    <div class="input-group">
      <label for="ClassMeetingTimes">Course Meeting Times</label>
      <input type="text" id="ClassMeetingTimes" placeholder="MWF 10:00AM">
    </div>
  </div>

  <div class="controls">
    <label for="pattern" style="font-weight:bold;">Session Pattern: </label>
    <select id="pattern" style="padding: 8px; border-radius: 4px;">
      <option value="4x50">4 × 50 min</option>
      <option value="3x75">3 × 75 min</option>
    </select>
    <button id="generate" type="button">Generate Sessions</button>
    <button id="export" type="button">Review Schedule</button>
  </div>

  <div id="sessionsWrap" style="margin-top: 20px;"></div>
  <div id="tableWrap"></div>
</main>

<script th:inline="javascript">
  (function(){
    const DAY_START = 660; // 11:00 AM
    const MAX_START = 1080; // 6:00 PM
    const STEP = 15;

    const genBtn = document.getElementById('generate');
    const exportBtn = document.getElementById('export');
    const wrap = document.getElementById('sessionsWrap');
    const tableWrap = document.getElementById('tableWrap');

    const fmt = m => {
      let h = Math.floor(m / 60);
      let mm = String(m % 60).padStart(2, '0');
      let suffix = h >= 12 ? 'PM' : 'AM';
      let displayH = h % 12 || 12;
      return `${displayH}:${mm} ${suffix}`;
    };

    function renderSessions() {
      wrap.innerHTML = '';
      tableWrap.innerHTML = '';
      const [count, dur] = document.getElementById('pattern').value.split('x').map(Number);

      for(let i=0; i<count; i++) {
        const div = document.createElement('div');
        div.className = 'session-row';

        const daySel = document.createElement('select');
        ['Monday','Tuesday','Wednesday','Thursday','Friday'].forEach(d => {
          const opt = document.createElement('option');
          opt.value = d; opt.textContent = d;
          daySel.appendChild(opt);
        });

        const startSel = document.createElement('select');
        for(let t = DAY_START; t <= MAX_START; t += STEP) {
          const opt = document.createElement('option');
          opt.value = t;
          opt.textContent = fmt(t);
          startSel.appendChild(opt);
        }

        const endDisplay = document.createElement('span');
        endDisplay.style.marginLeft = "15px";
        endDisplay.style.color = "#666";

        startSel.addEventListener('change', () => {
          endDisplay.textContent = " — Ends at " + fmt(Number(startSel.value) + dur);
        });

        div.innerHTML = `<span style="font-weight:bold; min-width:100px;">Session ${i+1}:</span>`;
        div.appendChild(daySel);
        div.appendChild(startSel);
        div.appendChild(endDisplay);

        startSel.dispatchEvent(new Event('change'));
        wrap.appendChild(div);
      }
    }

    // Logic to ensure no two sessions overlap on the same day
    function checkOverlaps() {
      const sessions = Array.from(wrap.querySelectorAll('.session-row'));
      const dur = Number(document.getElementById('pattern').value.split('x')[1]);
      const data = sessions.map(s => ({
        day: s.querySelectorAll('select')[0].value,
        start: Number(s.querySelectorAll('select')[1].value),
        end: Number(s.querySelectorAll('select')[1].value) + dur
      }));

      for (let i = 0; i < data.length; i++) {
        for (let j = i + 1; j < data.length; j++) {
          if (data[i].day === data[j].day) {
            if (data[i].start < data[j].end && data[i].end > data[j].start) {
              return `Conflict: Session ${i+1} and Session ${j+1} overlap on ${data[i].day}.`;
            }
          }
        }
      }
      return null;
    }

    exportBtn.addEventListener('click', () => {
      const overlapError = checkOverlaps();
      if (overlapError) {
        alert(overlapError);
        return;
      }

      const sessions = Array.from(wrap.querySelectorAll('.session-row'));
      if (!sessions.length) return;

      let html = `<table class="table-fill">
                <thead><tr>
                    <th>SI LEADER</th><th>CLASS</th><th>DAY</th><th>TIME</th><th>LOCATION</th><th>PROFESSOR</th>
                </tr></thead><tbody>`;

      sessions.forEach(s => {
        const day = s.querySelectorAll('select')[0].value;
        const start = Number(s.querySelectorAll('select')[1].value);
        const dur = Number(document.getElementById('pattern').value.split('x')[1]);
        const timeStr = `${fmt(start)} - ${fmt(start + dur)}`;

        html += `<tr>
                    <td><input class="table-input" value="${document.getElementById('SILeader').value}"></td>
                    <td><input class="table-input" value="${document.getElementById('Class').value}"></td>
                    <td><input class="table-input" value="${day}"></td>
                    <td><input class="table-input" value="${timeStr}"></td>
                    <td><input class="table-input" value="TBD"></td>
                    <td><input class="table-input" value="${document.getElementById('Professor').value}"></td>
                </tr>`;
      });

      html += `</tbody></table>
                <div style="margin-top:25px; text-align:right;">
                    <button id="dbSubmit" style="background:#6f263d; color:white; padding:12px 40px; font-size:1.1rem; border:none; cursor:pointer; border-radius:4px;">Submit Final Schedule</button>
                </div>`;

      tableWrap.innerHTML = html;

      document.getElementById('dbSubmit').addEventListener('click', async () => {
        const payload = {
          siLeader: document.getElementById('SILeader').value,
          className: document.getElementById('Class').value,
          sessions: Array.from(tableWrap.querySelectorAll('tbody tr')).map(tr => ({
            day: tr.cells[2].querySelector('input').value,
            time: tr.cells[3].querySelector('input').value
          }))
        };

        try {
          const res = await fetch('/api/schedule/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.ok) alert("Submitted successfully!");
        } catch(e) { alert("Server error."); }
      });
    });

    genBtn.addEventListener('click', renderSessions);
    renderSessions();
  })();
</script>

</body>
</html>
