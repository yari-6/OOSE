<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0,maximum-scale=1.0,width=device-width">
    <link rel="stylesheet" th:href="@{/SIschedule.css}">
    <title>SI Schedule</title>
</head>

<body>

<header class="header">
    <a th:href="@{/}">

        <img th:src="@{/static/Husky-Clip-Art-Transparent-File.png}" alt="Husky" class="logo">

    </a>

    <h1>SI Schedule</h1>
    <hr class="title-line">
</header>

<div class="stripe-container">

    <img th:src="@{/static/fadedstripe.svg}"  alt="Stripe" class="stripe">

    <div class="stripe-text">
        <hr class="accent-line">
    </div>

</div>

<table class="table-fill">
    <thead>
    <tr>
        <th>SI LEADER</th>
        <th>CLASS</th>
        <th>DAYS</th>
        <th>TIMES</th>
        <th>LOCATIONS</th>
        <th>PROFESSOR</th>
        <th>CLASS MEETING TIMES</th>
    </tr>
    </thead>
    <tbody>
    <script>
        function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        function fmt(m){ if (typeof m!=='number') return String(m); const h=Math.floor(m/60); return `${h}:${String(m%60).padStart(2,'0')}`; }

        const params = new URLSearchParams(window.location.search);
        const raw = params.get('schedule');
        let data = null;

        if (raw){
            try { data = JSON.parse(decodeURIComponent(raw)); }
            catch(e){ console.warn('Invalid schedule payload'); }
        } else {
            // fallback to individual query fields (SILeader, Class, ClassMeetingTimes, sessions as repeating params)
            const siLeader = params.get('SILeader') || '';
            const cls = params.get('Class') || '';
            const pro = params.get('Professor') || '';
            const cmt = params.get('ClassMeetingTimes') || '';
            const sessions = [];
            // support sessions encoded as session0_day, session0_start, session0_end, ... up to 10
            for (let i=0;i<10;i++){
                const day = params.get(`session${i}_day`);
                const start = params.get(`session${i}_start`);
                const end = params.get(`session${i}_end`);
                if (!day || !start || !end) continue;
                sessions.push({day, start: Number(start), end: Number(end)});
            }
            if (sessions.length) data = {siLeader, class: cls, professor: pro, classMeetingTimes: cmt, sessions};
        }

        const tbody = document.getElementById('scheduleBody');
        if (!data || !Array.isArray(data.sessions) || !data.sessions.length){
            // show a placeholder row
            const tr = document.createElement('tr');
            tr.innerHTML = '<td colspan="6">No schedule provided.</td>';
            tbody.appendChild(tr);
        } else {
            data.sessions.forEach(s => {
                const tr = document.createElement('tr');
                const times = (typeof s.start === 'number' && typeof s.end === 'number') ? `${fmt(s.start)} - ${fmt(s.end)}` : `${escapeHtml(s.start)} - ${escapeHtml(s.end)}`;
                tr.innerHTML =
                    `<td>${escapeHtml(data.siLeader)}</td>` +
                    `<td>${escapeHtml(data.class)}</td>` +
                    `<td>${escapeHtml(s.day)}</td>` +
                    `<td>${escapeHtml(times)}</td>` +
                    `<td>${escapeHtml(s.location || 'TBD')}</td>` +
                    `<td>${escapeHtml(data.professor)}</td>`;
                `<td>${escapeHtml(data.classMeetingTimes)}</td>`;
                tbody.appendChild(tr);
            });
        }
    </script>
    </tbody>
</table>


</body>

</html>
