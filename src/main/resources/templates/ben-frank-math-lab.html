<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/schedule-view.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
    <title>Ben Franklin Math Lab Schedule</title>
</head>

<body>
<div th:replace="~{headerFragment :: header('Ben Frank Math-Lab Schedule')}"></div>

<div class="dashboard-wrapper">

    <main class="schedule-card">
        <h2 class="card-title">Weekly Grid</h2>
        <hr class="gold-divider">
        <div th:replace="~{schedule-view :: scheduleView(true)}"></div>
    </main>

    <aside class="sidebar-card">
        <h2 class="card-title">Math Lab Tutors</h2>
        <hr class="gold-divider">

        <div class="tutor-scroll-list">
            <div th:each="tutor : ${activeTutors}" class="directory-card">
                <div class="directory-header">
                    <img th:src="${tutor.profilePicture != null ? tutor.profilePicture : '/graypfp.png'}" alt="pfp" class="sidebar-pfp">
                    <div class="directory-info">
                        <a th:href="@{/tutors/{id}(id=${tutor.tutorID})}"
                           th:text="${tutor.firstName + ' ' + tutor.lastName}" class="sidebar-tutor-name"></a>
                        <p class="tutor-type-label" th:text="${tutor.type}"></p>
                    </div>
                </div>

                <div class="directory-courses">
                    <span class="course-label">Available for:</span>
                    <div class="course-badge-container">
                            <span th:each="course : ${tutor.coursesOffered}"
                                  th:text="${course.courseID.courseSubject + ' ' + course.courseID.courseNumber}"
                                  class="course-badge"></span>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(activeTutors)}" class="empty-msg">
            No tutor info available.
        </div>
    </aside>
</div>
</body>
</html>
