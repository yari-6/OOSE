<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BloomTutors</title>
    <link rel="stylesheet" th:href="@{/schedule-view.css}">
    <link rel="stylesheet" th:href="@{/header.css}">

</head>
<!--for each entry in the row (except the header (time)), iterate through sessions list and if one matches, change bg color-->

  <table class = "schedule-view-table" th:fragment="scheduleView">
    <tr>
        <th>Time</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
    </tr>
    <tbody>
    <tr th:each="t : ${times}">
        <th th:text="${t}"></th>
        <td th:with="cell=${schedule['M '+ t.toString()]}"
            th:text="${cell != null ? cell.names : ''}"
            th:style="${cell != null ? 'background-color:' + cell.color : ''}"></td>
        <td th:with="cell=${schedule['T '+ t.toString()]}"
            th:text="${cell != null ? cell.names : ''}"
            th:style="${cell != null ? 'background-color: ' + cell.color : ''}"></td>
        <td th:with="cell=${schedule['W '+ t.toString()]}"
            th:text="${cell != null ? cell.names : ''}"
            th:style="${cell != null ? 'background-color:' + cell.color : ''}"></td>
        <td th:with="cell=${schedule['R '+ t.toString()]}"
            th:text="${cell != null ? cell.names : ''}"
            th:style="${cell != null ? 'background-color:' + cell.color : ''}"></td>
        <td th:with="cell=${schedule['F '+ t.toString()]}"
            th:text="${cell != null ? cell.names : ''}"
            th:style="${cell != null ? 'background-color:' + cell.color : ''}"></td>
    </tr>
    </tbody>
  </table>
</html>
